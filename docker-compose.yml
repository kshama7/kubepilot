# KubePilot local development stack.
#
# `docker compose up` brings up the Go API. It analyzes whatever cluster your
# kubeconfig points at. For a throwaway local cluster, run `scripts/kind-up.sh`
# first (requires kind); it creates a kind cluster whose API server is reachable
# from this container via host.docker.internal.
#
# Full observability stack (Prometheus + Grafana, scraping the API's /metrics):
#   docker compose --profile observability up
#   Grafana → http://localhost:3000 (admin/admin), "KubePilot — Reliability Overview".
services:
  api:
    build:
      context: ./backend
      args:
        VERSION: ${KUBEPILOT_VERSION:-dev-compose}
    ports:
      - "8080:8080"
    environment:
      KUBEPILOT_ADDR: ":8080"
      KUBEPILOT_LOG_FORMAT: ${KUBEPILOT_LOG_FORMAT:-json}
      KUBEPILOT_LOG_LEVEL: ${KUBEPILOT_LOG_LEVEL:-info}
      # Path is inside the container; see the volume mount below.
      KUBEPILOT_KUBECONFIG: /home/nonroot/.kube/config
      # Optional: export traces to the bundled OTel collector / Tempo if present.
      KUBEPILOT_OTEL_ENDPOINT: ${KUBEPILOT_OTEL_ENDPOINT:-}
    volumes:
      # Mount the kind-flavored kubeconfig written by scripts/kind-up.sh.
      # Falls back gracefully (analysis endpoints return 503) if absent.
      - ${KUBEPILOT_KUBECONFIG_HOST:-./.kube/config}:/home/nonroot/.kube/config:ro
    extra_hosts:
      # Lets the container reach a host-local kind/minikube API server.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "/kubepilot-api", "--healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
